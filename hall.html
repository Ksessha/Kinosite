<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ИДЁМВКИНО - Выбор мест</title>
    <link rel="stylesheet" href="css/hall.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <nav class="navbar">
                <div class="container">
                    <a href="index.html" class="logo-link">
                        <img src="images/logo.png" alt="ИДЁМВКИНО" class="logo-img">
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <div class="hall-wrapper">
        <div class="hall-info">
            <span class="movie-title" id="movie-title"></span>
            <p class="session-time" id="session-info"></p>
            <p class="hall-name" id="hall-name"></p>
        </div>

        <div class="black-hall">
            <div id="hall-scheme" class="hall-scheme"></div>

            <div class="legend">
                <div id="legend-free"><span class="seat free"></span> Свободно <span id="normal-price"></span></div>
                <div id="legend-vip"><span class="seat vip"></span> VIP <span id="vip-price"></span></div>
                <div><span class="seat busy"></span> Занято</div>
                <div><span class="seat selected"></span> Выбрано</div>
            </div>
        </div>

        <button class="book-btn"></button>
    </div>

    <script src="js/hall.js"></script>
</body>
</html>
