<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Электронный билет - ИДЁМВКИНО</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/ticket.css">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <nav class="navbar">
                <div class="container">
                    <a href="index.html" class="logo-link">
                        <img src="images/logo.png" alt="ИДЁМВКИНО" class="logo-img">
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="card-wrapper">  
                <div class="card">
                    <p class="card-header">Вы выбрали билеты:</p>
                    <div class="card-body">
                        <div id="ticket-content">
                            <div class="text-center mb-4">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Загрузка...</span>
                                </div>
                                <p class="mt-3">Загрузка информации о билете...</p>
                            </div>
                        </div>
                    </div>

                    <div class="card-button text-center">
                        <button id="get-code-btn">ПОЛУЧИТЬ КОД БРОНИРОВАНИЯ</button>
                    </div>
                    <div class="text-buttom">
                        <p>После оплаты билет будет доступен в этом окне, а также придёт вам на почту. Покажите QR-код нашему контроллёру у входа в зал.</p>
                        <p>Приятного просмотра!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>    

    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script src="js/ticket.js"></script>

</body>
</html>
