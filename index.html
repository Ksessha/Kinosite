<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИДЁМВКИНО - Бронирование билетов онлайн</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <nav class="navbar">
                <div class="container">
                    <a href="index.html" class="logo-link">
                        <img src="images/logo.png" alt="ИДЁМВКИНО" class="logo-img">
                    </a>
                </div>
            </nav>
            <a href="authorization.html" class="login-btn">ВОЙТИ</a>
        </div>
    </header>
    
    <div class="container mt-4">
        <div class="days-nav mb-4">
            <div class="days-row" id="days-container">
            </div>
        </div>
    </div>
    
    <div id="schedule" class="schedule-container">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Загрузка...</span>
            </div>
            <p class="mt-3">Загрузка расписания...</p>
        </div>
    </div>

    <template id="movie-template">
        <div class="movie-card mb-4">
          <div class="movie-content d-flex">

            <div class="left-block d-flex flex-column align-items-center">
              <img src="" class="movie-poster" alt="Постер фильма">
              <div class="halls-container">
              </div>
            </div>
      
            <div class="right-block d-flex flex-column justify-content-start">
              <h3 class="movie-title"></h3>
              <p class="movie-description"></p>
              <div class="movie-meta">
                <span class="duration"></span><span class="country"></span>
              </div>
            </div>
      
          </div>
        </div>
    </template>
      
    <template id="hall-schedule-template">
        <div class="hall-schedule">
            <div class="hall-title-wrapper">
                <h5 class="hall-title"></h5>
                <div class="hall-times">
                </div>
            </div>
        </div>
    </template>

    <template id="time-slot-template">
        <button class="time-slot">
            <span class="time-text"></span>
        </button>
    </template>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/api-sync.js"></script>
    <script src="js/admin.js"></script>    
</body>
</html>
